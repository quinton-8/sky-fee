version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: skyfee_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skyfee_network
    restart: unless-stopped

networks:
  skyfee_network:
    driver: bridge

volumes:
  postgres_data: